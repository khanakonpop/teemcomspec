<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>จัดสเปค by Teemcom</title>

<style>
body { margin:0; font-family:Arial; background:#f1f5f9; }
.container { display:flex; height:100vh; }

.sidebar {
  width:200px; background:#fff; border-right:1px solid #ddd; padding:10px;
}
.logo { text-align:center; margin-bottom:20px; }
.logo h2 { color:#0ea5e9; }

.category-btn {
  padding:10px; margin:5px 0; cursor:pointer; border-radius:5px;
}
.category-btn:hover { background:#e2e8f0; }
.active { background:#0ea5e9; color:white; }

.left { width:50%; padding:20px; overflow-y:auto; }
.grid { display:flex; flex-wrap:wrap; }

.card {
  width:180px; margin:10px; background:#fff;
  border:1px solid #ddd; border-radius:10px; cursor:pointer;
}
.card:hover { transform:scale(1.05); }

.card img { width:100%; height:120px; object-fit:cover; }
.card-body { padding:10px; }
.price { color:green; }

.right {
  width:30%; background:#fff; padding:20px; border-left:1px solid #ddd;
  overflow-y:auto;
}

button { margin:2px; padding:5px 10px; cursor:pointer; }

.btn-main {
  width:100%; background:#0ea5e9; color:#fff; border:none; padding:10px;
}
.btn-main:disabled { background:#94a3b8; cursor:not-allowed; }

.total { font-size:20px; color:green; margin-top:10px; }
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
  <div class="logo">
    <h2>TEEMCOM</h2>
  </div>

  <h3>หมวดหมู่</h3>
  <div id="categories"></div>
</div>

<div class="left">
  <h1>สินค้า</h1>
  <div id="products"></div>
</div>

<div class="right">
  <h2>สเปคของคุณ</h2>
  <div id="cart"></div>

  <div id="missing" style="margin-top:10px;"></div>
  <div id="alertBox" style="color:red;"></div>

  <div class="total">รวม: <span id="total">0</span> บาท</div>

  <button id="billBtn" class="btn-main" onclick="downloadBill()" disabled>
    📥 ดาวน์โหลดบิล
  </button>

  <button class="btn-main" style="background:red;margin-top:5px;" onclick="clearCart()">
    🗑 ลบทั้งหมด
  </button>
</div>

</div>

<script>
let data = {};
let cart = [];
let currentCategory = "all";

// 🔥 เลือกได้ 1 ชิ้น
const single = ["cpu","mainboard","psu","case"];

fetch("data.json")
.then(res => res.json())
.then(json => {
  data = json;
  renderCategories();
  renderProducts();
});

function renderCategories(){
  let div = document.getElementById("categories");
  div.innerHTML = "";

  let cats = ["all", ...Object.keys(data)];

  cats.forEach(cat=>{
    let btn = document.createElement("div");
    btn.className = "category-btn";
    if(cat===currentCategory) btn.classList.add("active");

    btn.innerText = cat.toUpperCase();

    btn.onclick = ()=>{
      currentCategory = cat;
      renderCategories();
      renderProducts();
    };

    div.appendChild(btn);
  });
}

function renderProducts(){
  let container = document.getElementById("products");
  container.innerHTML = "";

  let filtered = currentCategory === "all"
    ? Object.entries(data).flatMap(([cat, items]) => 
        items.map(i => ({...i, category: cat}))
      )
    : (data[currentCategory] || []).map(i => ({...i, category: currentCategory}));

  let grid = document.createElement("div");
  grid.className = "grid";

  filtered.forEach(item=>{
    let card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${item.image}" onerror="this.src='https://via.placeholder.com/150'">
      <div class="card-body">
        <div>${item.name}</div>
        <div class="price">${item.price} บาท</div>
      </div>
    `;

    card.onclick = ()=>addToCart(item);

    grid.appendChild(card);
  });

  container.appendChild(grid);
}

function addToCart(item){
  if(single.includes(item.category)){
    cart = cart.filter(i => i.category !== item.category);
    cart.push({...item, qty:1});
  } else {
    let found = cart.find(i=>i.name===item.name);
    if(found) found.qty++;
    else cart.push({...item, qty:1});
  }

  updateCart();
}

function updateCart(){
  let div = document.getElementById("cart");
  div.innerHTML = "";

  let total = 0;

  let grouped = {
    monitor: [],
    mainboard: [],
    cpu: [],
    ram: [],
    storage: [],
    gpu: [],
    psu: [],
    case: []
  };

  cart.forEach(item=>{
    if(item.category === "ssd" || item.category === "hdd"){
      grouped.storage.push(item);
    } else if(item.category === "gpu"){
      grouped.gpu.push(item);
    } else if(grouped[item.category]){
      grouped[item.category].push(item);
    }

    total += item.price * item.qty;
  });

  function renderGroup(title, items){
    if(items.length === 0) return;

    let html = `<b>${title} :</b><br>`;

    items.forEach(i=>{
      html += `
        ${i.name} (${i.qty}) 

        ${!single.includes(i.category) ? `
          <button onclick='increase(${JSON.stringify(i.name)})'>+</button>
          <button onclick='decrease(${JSON.stringify(i.name)})'>-</button>
        ` : ""}

        <button onclick='removeItem(${JSON.stringify(i.name)})'>ลบ</button>
        <br>
      `;
    });

    html += "<hr>";
    div.innerHTML += html;
  }

  renderGroup("Monitor", grouped.monitor);
  renderGroup("Mainboard", grouped.mainboard);
  renderGroup("CPU", grouped.cpu);
  renderGroup("RAM", grouped.ram);
  renderGroup("Storage", grouped.storage);
  renderGroup("Graphics card", grouped.gpu);
  renderGroup("PSU", grouped.psu);
  renderGroup("CASE", grouped.case);

  document.getElementById("total").innerText = total;

  checkSpec();
}

function checkSpec(){
  let c = cart.map(i=>i.category);
  let miss = [];

  if(!c.includes("cpu")) miss.push("CPU");
  if(!c.includes("gpu")) miss.push("GPU");
  if(!c.includes("mainboard")) miss.push("MAINBOARD");
  if(!c.includes("ram")) miss.push("RAM");
  if(!c.includes("psu")) miss.push("PSU");
  if(!c.includes("monitor")) miss.push("MONITOR");
  if(!c.includes("case")) miss.push("CASE");
  if(!c.includes("ssd") && !c.includes("hdd")) miss.push("STORAGE");

  let btn = document.getElementById("billBtn");

  if(miss.length===0){
    document.getElementById("missing").innerHTML = "✅ สเปคครบแล้ว";
    document.getElementById("missing").style.color = "green";
    btn.disabled = false;
  } else {
    document.getElementById("missing").innerHTML = "❌ ขาด: " + miss.join(", ");
    document.getElementById("missing").style.color = "red";
    btn.disabled = true;
  }
}

function increase(name){
  let item = cart.find(i=>i.name===name);
  item.qty++;
  updateCart();
}

function decrease(name){
  let item = cart.find(i=>i.name===name);
  item.qty--;

  if(item.qty<=0){
    cart = cart.filter(i=>i.name!==name);
  }

  updateCart();
}

function removeItem(name){
  cart = cart.filter(i=>i.name!==name);
  updateCart();
}

function clearCart(){
  cart = [];
  updateCart();
}

function downloadBill(){
  let c = cart.map(i=>i.category);
  if(c.length === 0){
    alert("ยังไม่มีสินค้า");
    return;
  }

  let csv = "สินค้า,จำนวน,ราคา\n";

  cart.forEach(i=>{
    csv += `${i.name},${i.qty},${i.price * i.qty}\n`;
  });

  let blob = new Blob([csv], {type:"text/csv"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "bill.csv";
  a.click();
}
</script>

</body>
</html>
